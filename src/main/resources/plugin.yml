name: ItaliaShop
version: 2.0.0
main: it.italiashop.ItaliaShop
api-version: 1.21
description: Shop e PvP Arena per SteelThrone
authors: [ItaliaShop]
depend: [Vault]
commands:
  cristalli:
    description: Gestisci i cristalli
    usage: /cristalli [give|set|check] <player> <quantita>
    aliases: [crystal, crystals]
  npc:
    description: Gestione NPC
    usage: /npc <place|remove> <mercato|pvp|spawner>
permissions:
  italiashop.admin:
    description: Permessi admin shop
    default: op
  italiashop.cristalli.give:
    description: Permessi per dare cristalli
    default: op
